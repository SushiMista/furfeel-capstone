name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dashboard:
    name: Dashboard (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci || npm install
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  mobile:
    name: Mobile (Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  edge:
    name: Edge Functions (Deno)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/edge
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno test --allow-none || deno test
